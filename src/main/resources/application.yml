spring:
  application:
    name: api-personal-data

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/personas}
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:app}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  mvc:
    log-request-details: false

  cache:
    type: simple

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    api-key: ${API_KEY:changeme-local-dev-key}
  cp-catalogo:
    cache-max-age-seconds: 86400

logging:
  level:
    root: INFO
    mx.personas.api: INFO
