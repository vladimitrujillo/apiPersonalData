spring:
  application:
    name: api-personal-data

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/personas}
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:app}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  mvc:
    log-request-details: false

  cache:
    type: simple

  servlet:
    multipart:
      max-file-size: ${SEPOMEX_ARCHIVO_TAMANO_MAXIMO:20MB}
      max-request-size: ${SEPOMEX_ARCHIVO_TAMANO_MAXIMO:20MB}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt-secret: ${JWT_SECRET}
    access-token-ttl-minutes: ${ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-ttl-days: ${REFRESH_TOKEN_TTL_DAYS:7}
    swagger-publico: ${SWAGGER_PUBLICO:true}
    admin-bootstrap-login: ${ADMIN_BOOTSTRAP_LOGIN:}
    admin-bootstrap-password: ${ADMIN_BOOTSTRAP_PASSWORD:}
  cp-catalogo:
    cache-max-age-seconds: 86400
  sepomex:
    import-cron: ${SEPOMEX_IMPORT_CRON:0 0 3 * * MON}
    directorio-entrada: ${SEPOMEX_DIRECTORIO_ENTRADA:./sepomex-entrada}
    directorio-procesados: ${SEPOMEX_DIRECTORIO_PROCESADOS:./sepomex-procesados}

logging:
  level:
    root: INFO
    mx.personas.api: INFO
